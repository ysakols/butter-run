name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: macos-15
    timeout-minutes: 15
    defaults:
      run:
        working-directory: ButterRun

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          XCODE_PATH=$(ls -d /Applications/Xcode_16*.app 2>/dev/null | sort -V | tail -1)
          if [ -z "$XCODE_PATH" ]; then
            XCODE_PATH="/Applications/Xcode.app"
          fi
          echo "Using $XCODE_PATH"
          sudo xcode-select -s "$XCODE_PATH/Contents/Developer"
          xcodebuild -version

      - name: Create CI build config
        run: |
          printf 'DEVELOPMENT_TEAM =\nBUNDLE_ID_PREFIX = com.butterrun.ci\n' > ButterRun.xcconfig

      - name: Build for Testing
        run: |
          xcodebuild build-for-testing \
            -project ButterRun.xcodeproj \
            -scheme ButterRun \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            CODE_SIGNING_ALLOWED=NO

  test:
    name: Unit Tests
    needs: build
    runs-on: macos-15
    timeout-minutes: 15
    continue-on-error: true
    defaults:
      run:
        working-directory: ButterRun

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          XCODE_PATH=$(ls -d /Applications/Xcode_16*.app 2>/dev/null | sort -V | tail -1)
          if [ -z "$XCODE_PATH" ]; then
            XCODE_PATH="/Applications/Xcode.app"
          fi
          sudo xcode-select -s "$XCODE_PATH/Contents/Developer"

      - name: Create CI build config
        run: |
          printf 'DEVELOPMENT_TEAM =\nBUNDLE_ID_PREFIX = com.butterrun.ci\n' > ButterRun.xcconfig

      - name: Build and Run Unit Tests
        run: |
          # Use perl alarm as hard kill - available on all macOS, unlike timeout
          perl -e '
            $SIG{ALRM} = sub {
              print STDERR "Tests exceeded 480s, killing...\n";
              kill -9, getpgrp();
              exit 124;
            };
            alarm 480;
            my $rc = system("xcodebuild", "test",
              "-project", "ButterRun.xcodeproj",
              "-scheme", "ButterRun",
              "-destination", "platform=iOS Simulator,name=iPhone 16,OS=latest",
              "-only-testing:ButterRunTests",
              "-parallel-testing-enabled", "NO",
              "CODE_SIGNING_ALLOWED=NO",
              "-resultBundlePath", "TestResults.xcresult");
            alarm 0;
            exit($rc >> 8);
          '

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: ButterRun/TestResults.xcresult
          retention-days: 7
