name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & Test
    runs-on: macos-15
    defaults:
      run:
        working-directory: ButterRun

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          XCODE_PATH=$(ls -d /Applications/Xcode_16*.app 2>/dev/null | sort -V | tail -1)
          if [ -z "$XCODE_PATH" ]; then
            XCODE_PATH="/Applications/Xcode.app"
          fi
          echo "Using $XCODE_PATH"
          sudo xcode-select -s "$XCODE_PATH/Contents/Developer"
          xcodebuild -version

      - name: Ensure iOS Simulator
        run: |
          if xcrun simctl list runtimes iOS 2>/dev/null | grep -q "iOS"; then
            echo "iOS simulator runtime available"
          else
            echo "Downloading iOS simulator runtime..."
            for i in 1 2 3; do
              xcodebuild -downloadPlatform iOS && break
              echo "Retry $i..."
              sleep 30
            done
          fi

      - name: Create CI build config
        run: |
          printf 'DEVELOPMENT_TEAM =\nBUNDLE_ID_PREFIX = com.butterrun.ci\n' > ButterRun.xcconfig

      - name: Build
        shell: bash {0}
        run: |
          xcodebuild build-for-testing \
            -project ButterRun.xcodeproj \
            -scheme ButterRun \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            CODE_SIGNING_ALLOWED=NO \
            2>&1 | tee /tmp/build.log | xcpretty
          EXIT=${PIPESTATUS[0]}
          [ $EXIT -ne 0 ] && exit $EXIT

      - name: Run Unit Tests
        shell: bash {0}
        run: |
          xcodebuild test-without-building \
            -project ButterRun.xcodeproj \
            -scheme ButterRun \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            -only-testing:ButterRunTests \
            CODE_SIGNING_ALLOWED=NO \
            -resultBundlePath TestResults.xcresult \
            2>&1 | tee /tmp/test.log | xcpretty
          EXIT=${PIPESTATUS[0]}
          [ $EXIT -ne 0 ] && exit $EXIT

      - name: Post failure details
        if: failure() && github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          LOG_FILE="/tmp/build.log"
          [ -f /tmp/test.log ] && LOG_FILE="/tmp/test.log"
          ERRORS=$(grep -E 'error:' "$LOG_FILE" 2>/dev/null | head -40 || echo "No error lines found")
          cd "$GITHUB_WORKSPACE"
          gh pr comment ${{ github.event.pull_request.number }} --body "## Build Errors
          \`\`\`
          $ERRORS
          \`\`\`"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: ButterRun/TestResults.xcresult
          retention-days: 7
