name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & Test
    runs-on: macos-15
    defaults:
      run:
        working-directory: ButterRun

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          XCODE_PATH=$(ls -d /Applications/Xcode_16*.app 2>/dev/null | sort -V | tail -1)
          if [ -z "$XCODE_PATH" ]; then
            XCODE_PATH="/Applications/Xcode.app"
          fi
          echo "Using $XCODE_PATH"
          sudo xcode-select -s "$XCODE_PATH/Contents/Developer"
          xcodebuild -version

      - name: Ensure iOS Simulator
        run: |
          if xcrun simctl list runtimes iOS 2>/dev/null | grep -q "iOS"; then
            echo "iOS simulator runtime available"
          else
            echo "Downloading iOS simulator runtime..."
            for i in 1 2 3; do
              xcodebuild -downloadPlatform iOS && break
              echo "Retry $i..."
              sleep 30
            done
          fi

      - name: Create CI build config
        run: |
          printf 'DEVELOPMENT_TEAM =\nBUNDLE_ID_PREFIX = com.butterrun.ci\n' > ButterRun.xcconfig

      - name: Build & Test
        shell: bash {0}
        timeout-minutes: 15
        run: |
          # Boot simulator first to avoid timeout during test phase
          DEVICE=$(xcrun simctl list devices available | grep "iPhone 16" | head -1 | sed 's/.*(\(.*\)) .*/\1/')
          if [ -n "$DEVICE" ]; then
            echo "Booting simulator $DEVICE..."
            xcrun simctl boot "$DEVICE" 2>/dev/null || true
          fi

          xcodebuild test \
            -project ButterRun.xcodeproj \
            -scheme ButterRun \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            -only-testing:ButterRunTests \
            -skip-testing:ButterRunUITests \
            CODE_SIGNING_ALLOWED=NO \
            -resultBundlePath TestResults.xcresult \
            2>&1 | tee /tmp/build.log
          EXIT=${PIPESTATUS[0]}
          [ $EXIT -ne 0 ] && exit $EXIT

      - name: Post failure details
        if: failure() && github.event_name == 'pull_request'
        shell: bash {0}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          {
            echo "## Build/Test Failure Details"
            echo '```'
            if [ -f /tmp/build.log ]; then
              echo "=== errors and failures ==="
              grep -iE '(error:|failed|FAIL |fatal)' /tmp/build.log | head -40 || true
              echo ""
              echo "=== last 30 lines ==="
              tail -30 /tmp/build.log
            else
              echo "No build log found — failure before build step."
              echo "Xcode: $(xcodebuild -version 2>&1 | head -1)"
              echo "Runtimes: $(xcrun simctl list runtimes iOS 2>&1 | head -3)"
            fi
            echo '```'
          } > /tmp/comment.md
          cd "$GITHUB_WORKSPACE"
          gh pr comment ${{ github.event.pull_request.number }} --body-file /tmp/comment.md || true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: ButterRun/TestResults.xcresult
          retention-days: 7
