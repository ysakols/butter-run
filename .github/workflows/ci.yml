name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: macos-15
    timeout-minutes: 15
    defaults:
      run:
        working-directory: ButterRun

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          XCODE_PATH=$(ls -d /Applications/Xcode_16*.app 2>/dev/null | sort -V | tail -1)
          if [ -z "$XCODE_PATH" ]; then
            XCODE_PATH="/Applications/Xcode.app"
          fi
          echo "Using $XCODE_PATH"
          sudo xcode-select -s "$XCODE_PATH/Contents/Developer"
          xcodebuild -version

      - name: Create CI build config
        run: |
          printf 'DEVELOPMENT_TEAM =\nBUNDLE_ID_PREFIX = com.butterrun.ci\n' > ButterRun.xcconfig

      - name: Build for Testing
        run: |
          xcodebuild build-for-testing \
            -project ButterRun.xcodeproj \
            -scheme ButterRun \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            CODE_SIGNING_ALLOWED=NO

  test:
    name: Unit Tests
    needs: build
    runs-on: macos-15
    timeout-minutes: 15
    continue-on-error: true
    defaults:
      run:
        working-directory: ButterRun

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          XCODE_PATH=$(ls -d /Applications/Xcode_16*.app 2>/dev/null | sort -V | tail -1)
          if [ -z "$XCODE_PATH" ]; then
            XCODE_PATH="/Applications/Xcode.app"
          fi
          sudo xcode-select -s "$XCODE_PATH/Contents/Developer"

      - name: Create CI build config
        run: |
          printf 'DEVELOPMENT_TEAM =\nBUNDLE_ID_PREFIX = com.butterrun.ci\n' > ButterRun.xcconfig

      - name: Prepare Simulator
        run: |
          # Create a fresh simulator to avoid state issues
          RUNTIME=$(xcrun simctl list runtimes iOS -j | python3 -c "
          import json, sys
          for r in json.load(sys.stdin)['runtimes']:
              if r['isAvailable'] and not r.get('isBeta', False):
                  print(r['identifier']); sys.exit(0)
          for r in json.load(sys.stdin)['runtimes']:
              if r['isAvailable']:
                  print(r['identifier']); sys.exit(0)
          ")
          echo "Runtime: $RUNTIME"
          UDID=$(xcrun simctl create "CI_Test" "iPhone 16" "$RUNTIME")
          echo "Created simulator: $UDID"
          xcrun simctl boot "$UDID"
          echo "UDID=$UDID" >> "$GITHUB_ENV"

      - name: Build and Run Unit Tests
        run: |
          xcodebuild test \
            -project ButterRun.xcodeproj \
            -scheme ButterRun \
            -destination "platform=iOS Simulator,id=$UDID" \
            -only-testing:ButterRunTests \
            -parallel-testing-enabled NO \
            -destination-timeout 120 \
            CODE_SIGNING_ALLOWED=NO \
            -resultBundlePath TestResults.xcresult

      - name: Cleanup Simulator
        if: always()
        run: xcrun simctl delete "$UDID" 2>/dev/null || true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: ButterRun/TestResults.xcresult
          retention-days: 7
