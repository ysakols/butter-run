name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & Test
    runs-on: macos-15
    defaults:
      run:
        working-directory: ButterRun

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          XCODE_PATH=$(ls -d /Applications/Xcode_16*.app 2>/dev/null | sort -V | tail -1)
          if [ -z "$XCODE_PATH" ]; then
            XCODE_PATH="/Applications/Xcode.app"
          fi
          echo "Using $XCODE_PATH"
          sudo xcode-select -s "$XCODE_PATH/Contents/Developer"
          xcodebuild -version

      - name: Ensure iOS Simulator
        run: |
          if xcrun simctl list runtimes iOS 2>/dev/null | grep -q "iOS"; then
            echo "iOS simulator runtime available"
          else
            echo "Downloading iOS simulator runtime..."
            for i in 1 2 3; do
              xcodebuild -downloadPlatform iOS && break
              echo "Retry $i..."
              sleep 30
            done
          fi

      - name: Create CI build config
        run: |
          printf 'DEVELOPMENT_TEAM =\nBUNDLE_ID_PREFIX = com.butterrun.ci\n' > ButterRun.xcconfig

      - name: Boot Simulator
        run: |
          DEVICE_ID=$(xcrun simctl list devices available -j | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          for runtime, devices in data['devices'].items():
              if 'iOS' in runtime:
                  for d in devices:
                      if 'iPhone 16' in d['name'] and d['isAvailable']:
                          print(d['udid'])
                          sys.exit(0)
          " 2>/dev/null)
          if [ -n "$DEVICE_ID" ]; then
            echo "DEVICE_ID=$DEVICE_ID" >> "$GITHUB_ENV"
            echo "Booting simulator $DEVICE_ID..."
            xcrun simctl boot "$DEVICE_ID" 2>/dev/null || true
            # Wait for boot to complete
            xcrun simctl bootstatus "$DEVICE_ID" -b 2>/dev/null || true
            echo "Simulator booted"
          else
            echo "Warning: Could not find iPhone 16 simulator"
          fi

      - name: Build
        timeout-minutes: 10
        run: |
          xcodebuild build-for-testing \
            -project ButterRun.xcodeproj \
            -scheme ButterRun \
            -destination "platform=iOS Simulator,name=iPhone 16,OS=latest" \
            CODE_SIGNING_ALLOWED=NO \
            2>&1 | tee /tmp/build.log
          echo "Build exit code: $?"

      - name: Run Unit Tests
        shell: bash {0}
        timeout-minutes: 10
        run: |
          xcodebuild test-without-building \
            -project ButterRun.xcodeproj \
            -scheme ButterRun \
            -destination "platform=iOS Simulator,name=iPhone 16,OS=latest" \
            -only-testing:ButterRunTests \
            -resultBundlePath TestResults.xcresult \
            2>&1 | tee /tmp/test.log
          EXIT=$?
          echo "Test exit code: $EXIT"
          [ $EXIT -ne 0 ] && exit $EXIT

      - name: Post failure details
        if: failure() && github.event_name == 'pull_request'
        shell: bash {0}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          {
            echo "## Build/Test Failure Details"
            echo '```'
            for LOG in /tmp/build.log /tmp/test.log; do
              if [ -f "$LOG" ]; then
                echo "=== $(basename $LOG) errors ==="
                grep -iE '(error:|failed|FAIL |fatal|Test Case.*failed)' "$LOG" | head -30 || true
                echo ""
              fi
            done
            echo "=== test.log last 40 lines ==="
            tail -40 /tmp/test.log 2>/dev/null || tail -40 /tmp/build.log 2>/dev/null || echo "No logs found"
            echo '```'
          } > /tmp/comment.md
          cd "$GITHUB_WORKSPACE"
          gh pr comment ${{ github.event.pull_request.number }} --body-file /tmp/comment.md || true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: ButterRun/TestResults.xcresult
          retention-days: 7
